name: Validate Tax XML Files

on:
  push:
    branches: [main, master]
    paths:
      - '**.xml'
  pull_request:
    branches: [main, master]
    paths:
      - '**.xml'
  workflow_dispatch:
    inputs:
      target:
        description: 'Duong dan file/folder XML can validate'
        required: false
        default: '.'

jobs:
  validate:
    runs-on: [self-hosted, windows, itax]
    env:
      ITAX_HOME: ${{ vars.ITAX_HOME || 'C:\itaxview\iTax Viewer' }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
      - name: Build
        run: mvn package -B -q
      - name: Validate
        shell: pwsh
        run: |
          $target = "${{ github.workspace }}\${{ inputs.target || '.' }}"
          Write-Host "Target: $target" -ForegroundColor Cyan
          & "scripts/run-validator.ps1" "$env:ITAX_HOME" "$target"
          exit $LASTEXITCODE
